<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    button{user-select:none;-webkit-user-select:none;}
    .login-tab-btn{flex:1;padding:12px 0;background:none;border:none;border-bottom:3px solid transparent;
      font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
      letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s;color:#5a8a62}
    .login-tab-btn.active{color:#1a6b1e;border-bottom-color:#1a6b1e}
  </style>

<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#fff;flex-direction:column;gap:16px">
      <div style="width:44px;height:44px;border:4px solid #1a6b1e;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite"></div>
      <div style="color:#4a7a55;font-size:14px;letter-spacing:0.1em;font-family:'Rajdhani',sans-serif">Cargando aplicación...</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const {useState, useEffect, useCallback, useRef, useMemo} = React;

    /* ══════════════════════════════════════════════════════════════
       ICONO SVG — desde icon.svg embebido
    ══════════════════════════════════════════════════════════════ */

          <rect width="512" height="512" rx="90" fill="#004d26"/>
          <rect width="512" height="220" fill="#006633"/>
          <rect width="512" height="140" rx="90" fill="#006633"/>
          <rect x="100" y="300" width="312" height="82" rx="14" fill="white"/>
          <path d="M155 300 L178 242 Q188 220 210 220 L302 220 Q324 220 334 242 L357 300 Z" fill="white"/>
          <path d="M190 290 L201 255 Q206 240 218 240 L294 240 Q306 240 311 255 L322 290 Z" fill="#006633" opacity="0.35"/>
          <circle cx="173" cy="385" r="37" fill="#003311" stroke="white" strokeWidth="8"/>
          <circle cx="173" cy="385" r="14" fill="white"/>
          <circle cx="339" cy="385" r="37" fill="#003311" stroke="white" strokeWidth="8"/>
          <circle cx="339" cy="385" r="14" fill="white"/>
          <rect x="104" y="315" width="42" height="18" rx="6" fill="#ccffcc"/>
          <rect x="366" y="315" width="42" height="18" rx="6" fill="#ffaaaa"/>
          <rect x="70" y="455" width="372" height="6" rx="3" fill="white" opacity="0.35"/>
        </svg>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       COLORES CORPORATIVOS
    ══════════════════════════════════════════════════════════════ */
    const G       = "#1a6b1e";
    const GM      = "#2e9e35";
    const GHD     = "#0d3d12";
    const BG      = "#ffffff";
    const SRF     = "#f4faf5";
    const BD      = "#c8e6c9";
    const TX      = "#1a2e1a";
    const TM      = "#5a8a62";
    const DANGER  = "#dc2626";
    const DANGER_BG  = "#fef2f2";
    const SUCCESS    = "#15803d";
    const SUCCESS_BG = "#f0fdf4";

    /* ══════════════════════════════════════════════════════════════
       PORTERÍAS — rt expandido con Visitante y Contratista
    ══════════════════════════════════════════════════════════════ */
    const PC = {
      "Portería Principal":    {icon:"🏢", color:G,        tipos:["Residente","Gerente","Visitante","Contratista"],        rt:["Residente","Gerente","Visitante","Contratista"]},
      "Portería Efluentes":    {icon:"🏭", color:"#2e7d32", tipos:["Colaborador","Visitante","Contratista"],                rt:["Colaborador","Visitante","Contratista"]},
      "Portería Biopacol":     {icon:"🌿", color:"#388e3c", tipos:["Colaborador Biopacol","Visitante","Contratista"],      rt:["Colaborador Biopacol","Visitante","Contratista"]},
      "Portería Urbanización": {icon:"🏘️", color:"#43a047", tipos:["Residente","Visitante","Contratista"],                 rt:["Residente","Visitante","Contratista"]},
      "Parqueadero Principal": {icon:"🅿️", color:"#1b5e20", tipos:["Colaborador","Visitante","Contratista"],               rt:["Colaborador","Visitante","Contratista"]},
    };
    const ALL_RT = ["Residente","Gerente","Visitante","Contratista","Colaborador","Colaborador Biopacol"];
    const TC = {
      "Residente":            {bg:"#e8f5e9", c:"#1b5e20"},
      "Gerente":              {bg:"#e8f5e9", c:"#1a6b1e"},
      "Visitante":            {bg:"#f1f8e9", c:"#33691e"},
      "Contratista":          {bg:"#fff8e1", c:"#e65100"},
      "Colaborador":          {bg:"#e8f5e9", c:"#2e7d32"},
      "Colaborador Biopacol": {bg:"#e0f2f1", c:"#00695c"},
    };

    /* ══════════════════════════════════════════════════════════════
       SEGURIDAD — Hash PBKDF2
    ══════════════════════════════════════════════════════════════ */
    async function hashPass(password, salt){
      const enc = new TextEncoder();
      const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveBits']);
      const bits = await crypto.subtle.deriveBits({name:'PBKDF2', salt:enc.encode(salt), iterations:100000, hash:'SHA-256'}, keyMat, 256);
      return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    function getOrCreateSalt(){
      let s = localStorage.getItem('_salt');
      if(!s){ s = crypto.getRandomValues(new Uint8Array(16)).join(''); localStorage.setItem('_salt',s); }
      return s;
    }

    /* ══════════════════════════════════════════════════════════════
       STORAGE LOCAL
    ══════════════════════════════════════════════════════════════ */
    const MAX_LOCAL_RECORDS = 2000;
    function lsGet(k, d){
      try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }
      catch{ return d; }
    }
    function lsSet(k, v){
      try{ localStorage.setItem(k, JSON.stringify(v)); }
      catch(e){
        if(e.name==='QuotaExceededError' && k==='vpn_r'){
          const current = lsGet('vpn_r',[]);
          const trimmed = current.slice(0, Math.floor(MAX_LOCAL_RECORDS/2));
          try{ localStorage.setItem(k, JSON.stringify(trimmed)); }catch{}
        }
      }
    }

    /* ══════════════════════════════════════════════════════════════
       SANITIZACIÓN
    ══════════════════════════════════════════════════════════════ */
    function sanitize(str, maxLen=200){
      if(typeof str !== 'string') return '';
      return str.slice(0, maxLen)
        .replace(/[<>"'`]/g, c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;','`':'&#x60;'}[c]))
        .trim();
    }
    /* Solo letras y números, máx 6 caracteres — sin guión ni especiales */
    function sanitizePlaca(str){
      return str.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
    }

    /* Validación de placas colombianas */
    const PLACA_CARRO = /^[A-Z]{3}[0-9]{3}$/;      // ABC123
    const PLACA_MOTO  = /^[A-Z]{3}[0-9]{2}[A-Z]$/; // ABC92C
    function validarPlaca(placa, vehiculo){
      if(!placa) return false;
      if(vehiculo==='moto')  return PLACA_MOTO.test(placa);
      if(vehiculo==='carro') return PLACA_CARRO.test(placa);
      return PLACA_CARRO.test(placa) || PLACA_MOTO.test(placa);
    }

    /* ══════════════════════════════════════════════════════════════
       GOOGLE SHEETS API
    ══════════════════════════════════════════════════════════════ */
    async function gsPost(url, data){
      if(!url) return false;
      try{
        const resp = await fetch(url, {
          method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
          body:JSON.stringify(data), redirect:'follow', signal:AbortSignal.timeout(15000),
        });
        return resp.ok || resp.status===302;
      }catch(e){ console.warn('GS POST error:', e?.message); return false; }
    }
    async function gsGet(url, params={}){
      if(!url) return null;
      try{
        const u = new URL(url);
        Object.entries(params).forEach(([k,v])=> u.searchParams.set(k, String(v)));
        const resp = await fetch(u.toString(), {cache:'no-store', signal:AbortSignal.timeout(15000)});
        if(!resp.ok) throw new Error('HTTP '+resp.status);
        return await resp.json();
      }catch(e){ console.warn('GS GET error:', e?.message); return null; }
    }

    /* ══════════════════════════════════════════════════════════════
       UTILIDADES
    ══════════════════════════════════════════════════════════════ */
    function genId(){ return Date.now().toString(36)+crypto.getRandomValues(new Uint8Array(4)).join(''); }
    function fmtDate(ts){
      if(!ts) return '';
      const d = new Date(ts);
      if(isNaN(d)) return String(ts);
      return d.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
    function nowISO(){ return new Date().toISOString(); }
    function nowLabel(){
      return new Date().toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
    function exportCSV(recs){
      const h = "Fecha,Portería,Movimiento,Tipo,Vehículo,Placa,Conductor,Guarda,Visita A,Observaciones";
      const rows = recs.map(r=>[
        r.fecha||r.ts||'', r.porteria||'', (r.movimiento||'').toUpperCase(),
        r.tipo||'', r.vehiculo||'', r.placa||'', r.conductor||'', r.guarda||'',
        r.visitaA||'', r.obs||''
      ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
      const csv = "\uFEFF" + [h,...rows].join('\r\n');
      const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`registros-pn-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 60000);
    }

    /* ══════════════════════════════════════════════════════════════
       COMPONENTES UI
    ══════════════════════════════════════════════════════════════ */
    function Badge({tipo}){
      const c = TC[tipo]||{bg:'#f5f5f5',c:'#666'};
      return (
        <span style={{background:c.bg,color:c.c,padding:'2px 9px',borderRadius:20,
          fontSize:10,fontWeight:700,letterSpacing:'0.06em',whiteSpace:'nowrap',
          border:`1px solid ${c.c}30`,display:'inline-block'}}>
          {tipo ? tipo.toUpperCase() : '—'}
        </span>
      );
    }
    function BadgeVeh({vehiculo}){
      if(!vehiculo) return null;
      const isMoto = vehiculo==='moto';
      return (
        <span style={{background:isMoto?'#fef3c7':'#e0f2fe',color:isMoto?'#92400e':'#0369a1',
          padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:'0.06em',
          border:`1px solid ${isMoto?'#fcd34d':'#7dd3fc'}`,display:'inline-block',whiteSpace:'nowrap'}}>
          {isMoto?'🏍 MOTO':'🚗 CARRO'}
        </span>
      );
    }
    function FErr({msg='Campo requerido'}){
      return (
        <div role="alert" style={{color:DANGER,fontSize:11,marginTop:5,
          fontFamily:'DM Sans,sans-serif',display:'flex',alignItems:'center',gap:4}}>
          <span>✕</span> {msg}
        </div>
      );
    }
    function Toast({t}){
      return (
        <div role="status" aria-live="polite"
          style={{position:'fixed',top:18,left:'50%',transform:'translateX(-50%)',
            background:t.err?DANGER_BG:SUCCESS_BG,
            border:`1px solid ${t.err?'#fca5a5':'#86efac'}`,
            color:t.err?DANGER:SUCCESS,
            padding:'11px 22px',borderRadius:10,fontSize:14,fontWeight:700,
            zIndex:9999,maxWidth:'90vw',textAlign:'center',
            fontFamily:'Rajdhani,sans-serif',letterSpacing:'0.06em',
            boxShadow:'0 4px 20px rgba(0,0,0,0.15)',animation:'fadeIn 0.2s ease',
            pointerEvents:'none'}}>
          {t.msg}
        </div>
      );
    }
    function SyncBar({syncing, lastSync, err}){
      if(!syncing && !err && !lastSync) return null;
      return (
        <div style={{background:err?DANGER_BG:syncing?'#fffbeb':SUCCESS_BG,
          borderBottom:`1px solid ${err?'#fca5a5':syncing?'#fde68a':'#86efac'}`,
          padding:'4px 16px',fontSize:11,fontFamily:'DM Sans,sans-serif',
          color:err?DANGER:syncing?'#92400e':SUCCESS,
          display:'flex',alignItems:'center',gap:6}}>
          {syncing && <span style={{width:8,height:8,borderRadius:'50%',background:'#d97706',
            display:'inline-block',animation:'pulse 1s infinite',flexShrink:0}}/>}
          {err?'⚠️ Sin conexión — datos locales'
            :syncing?'Sincronizando con Google Sheets...'
            :lastSync&&`✓ Sync ${fmtDate(lastSync)}`}
        </div>
      );
    }
    function Spinner(){
      return <div style={{width:18,height:18,border:'3px solid rgba(255,255,255,0.3)',
        borderTopColor:'white',borderRadius:'50%',animation:'spin 0.8s linear infinite',
        display:'inline-block',flexShrink:0}}/>;
    }

    /* ── Tarjeta de registro ── */
    function RecordCard({r, onExit, hasExit, showPort}){
      const [confirm, setConfirm] = useState(false);
      const isIng = r.movimiento==='ingreso';
      const done  = isIng && hasExit(r);
      return (
        <div style={{background:BG,borderRadius:12,padding:16,
          border:`1px solid ${BD}`,borderLeft:`4px solid ${isIng?'#16a34a':DANGER}`,
          marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',animation:'fadeIn 0.2s ease'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,gap:8}}>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,
                letterSpacing:'0.06em',
                background:isIng?'#dcfce7':DANGER_BG,
                color:isIng?'#15803d':DANGER,
                border:`1px solid ${isIng?'#86efac':'#fca5a5'}`}}>
                {isIng?'⬆ INGRESO':'⬇ SALIDA'}
              </span>
              <Badge tipo={r.tipo}/>
              {r.vehiculo && <BadgeVeh vehiculo={r.vehiculo}/>}
            </div>
            <div style={{fontSize:11,color:TM,fontFamily:'DM Sans,sans-serif',whiteSpace:'nowrap',flexShrink:0}}>
              {fmtDate(r.ts||r.fecha)}
            </div>
          </div>
          <div style={{fontWeight:700,fontSize:22,letterSpacing:'0.12em',color:TX,lineHeight:1.1}}>{r.placa}</div>
          <div style={{fontSize:14,color:TM,fontFamily:'DM Sans,sans-serif',marginTop:3}}>{r.conductor}</div>
          {r.visitaA && (
            <div style={{fontSize:12,color:TM,fontFamily:'DM Sans,sans-serif',marginTop:3}}>
              Visita a: <strong style={{color:TX}}>{r.visitaA}</strong>
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8,flexWrap:'wrap',gap:4}}>
            {showPort && <div style={{fontSize:11,color:TM}}>{PC[r.porteria]?.icon} {r.porteria}</div>}
            <div style={{fontSize:11,color:TM}}>Guarda: {r.guarda}</div>
          </div>
          {r.obs && (
            <div style={{marginTop:8,padding:'7px 11px',background:SRF,borderRadius:7,
              fontSize:12,color:TM,fontFamily:'DM Sans,sans-serif',
              border:`1px solid ${BD}`,wordBreak:'break-word'}}>
              💬 {r.obs}
            </div>
          )}
          {isIng && !done && (
            !confirm
              ? <button onClick={()=>setConfirm(true)}
                  style={{marginTop:10,width:'100%',padding:'9px',borderRadius:8,
                    border:`1px solid ${DANGER}`,background:DANGER_BG,color:DANGER,
                    fontFamily:'Rajdhani,sans-serif',fontSize:14,fontWeight:700,
                    letterSpacing:'0.06em',cursor:'pointer'}}>
                  ⬇ SALIDA
                </button>
              : <div style={{marginTop:10,display:'flex',gap:8}}>
                  <button onClick={()=>{onExit(r);setConfirm(false);}}
                    style={{flex:1,padding:'10px',borderRadius:8,border:'none',
                      background:DANGER,color:'white',fontFamily:'Rajdhani,sans-serif',
                      fontSize:14,fontWeight:700,cursor:'pointer'}}>
                    ✓ CONFIRMAR SALIDA
                  </button>
                  <button onClick={()=>setConfirm(false)}
                    style={{padding:'10px 14px',borderRadius:8,border:`1px solid ${BD}`,
                      background:BG,color:TM,fontFamily:'Rajdhani,sans-serif',
                      fontSize:14,fontWeight:700,cursor:'pointer'}}>✕</button>
                </div>
          )}
          {isIng && done && (
            <div style={{marginTop:8,fontSize:11,color:SUCCESS,fontFamily:'DM Sans,sans-serif',
              textAlign:'center',padding:'6px',background:SUCCESS_BG,borderRadius:6,
              border:'1px solid #86efac'}}>
              ✓ Salida ya registrada
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       FORMULARIO RECURRENTE (reutilizable)
    ══════════════════════════════════════════════════════════════ */
    function FormRecurrente({tiposDisponibles, rvList, onAdd, onImport, color, importRef}){
      const [nrv, setNrv] = useState({placa:'',conductor:'',tipo:'',vehiculo:''});
      const inp2 = (err=false)=>({
        width:'100%',background:err?DANGER_BG:SRF,border:`1.5px solid ${err?'#fca5a5':BD}`,
        borderRadius:8,padding:'11px 14px',color:TX,fontFamily:'Rajdhani,sans-serif',
        fontSize:15,outline:'none',boxSizing:'border-box',
      });
      const sel2 = (err=false)=>({...inp2(err),appearance:'none',WebkitAppearance:'none'});
      const lbl2 = {display:'block',fontSize:11,fontWeight:600,letterSpacing:'0.12em',
        color:TM,marginBottom:7,textTransform:'uppercase',fontFamily:'DM Sans,sans-serif'};
      const btn2 = (bg,col,ex={})=>({borderRadius:8,padding:13,fontFamily:'Rajdhani,sans-serif',
        fontSize:16,fontWeight:700,letterSpacing:'0.06em',cursor:'pointer',border:'none',
        background:bg,color:col,width:'100%',boxShadow:(bg===G||bg===color)?'0 2px 8px rgba(26,107,30,0.25)':'none',...ex});
      const placaPlaceholder = nrv.vehiculo==='moto'?'ABC92C':nrv.vehiculo==='carro'?'ABC123':'ABC123 / ABC92C';
      return (
        <div>
          {/* Tipo vehículo */}
          <label style={lbl2}>Tipo de vehículo *</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
            {[['carro','🚗 Carro'],['moto','🏍 Moto']].map(([v,l])=>(
              <button key={v} onClick={()=>setNrv(p=>({...p,vehiculo:v,placa:''}))}
                style={{padding:'12px 0',borderRadius:8,cursor:'pointer',fontFamily:'Rajdhani,sans-serif',
                  fontSize:15,fontWeight:700,border:`2px solid ${nrv.vehiculo===v?color:BD}`,
                  background:nrv.vehiculo===v?'#e8f5e9':BG,color:nrv.vehiculo===v?color:TM}}>
                {l}
              </button>
            ))}
          </div>
          <label style={lbl2}>Tipo *</label>
          <select style={{...sel2(false),marginBottom:12}} value={nrv.tipo}
            onChange={e=>setNrv(p=>({...p,tipo:e.target.value}))}>
            <option value="">— Seleccionar tipo —</option>
            {tiposDisponibles.map(t=><option key={t}>{t}</option>)}
          </select>
          <label style={lbl2}>Placa *</label>
          <input style={{...inp2(false),marginBottom:12,textTransform:'uppercase',
            fontWeight:700,letterSpacing:'0.1em',fontSize:18}}
            placeholder={placaPlaceholder} value={nrv.placa} maxLength={6}
            onChange={e=>setNrv(p=>({...p,placa:sanitizePlaca(e.target.value)}))}/>
          <label style={lbl2}>Conductor *</label>
          <input style={{...inp2(false),marginBottom:14}}
            placeholder="Nombre completo" value={nrv.conductor} maxLength={120}
            onChange={e=>setNrv(p=>({...p,conductor:e.target.value}))}/>
          <button style={btn2(color||G,'white',{marginBottom:10})}
            onClick={()=>onAdd(nrv,()=>setNrv({placa:'',conductor:'',tipo:'',vehiculo:''}))}>
            + AGREGAR RECURRENTE
          </button>
          {onImport && <>
            <input type="file" accept=".csv,.txt" ref={importRef}
              onChange={onImport} style={{display:'none'}}/>
            <button style={btn2(BG,color||G,{border:`1.5px solid ${color||G}`,boxShadow:'none',fontSize:14})}
              onClick={()=>importRef.current?.click()}>
              📂 IMPORTAR CSV
            </button>
            <div style={{fontSize:11,color:TM,fontFamily:'DM Sans,sans-serif',
              marginTop:8,lineHeight:1.6,padding:'8px 10px',background:SRF,borderRadius:6}}>
              Formato CSV: <strong>placa,conductor,tipo,vehiculo</strong><br/>
              Tipos: Residente, Gerente, Colaborador, Colaborador Biopacol, Contratista, Visitante<br/>
              Vehículo: carro / moto (opcional, se detecta por placa)
            </div>
          </>}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════
       APP PRINCIPAL
    ══════════════════════════════════════════════════════════════ */
    function App(){
      const [cfg, setCfg] = useState(()=> lsGet('vpn_cfg2', {
        url:'', user:'admin', passHash:'', passInitialized:false, viewers:[]
      }));
      const isOk = cfg.url && cfg.url.includes('script.google.com');

      const [screen,  setScr]  = useState('login');
      const [user,    setUser] = useState(null);
      const [records, setRec]  = useState(()=> lsGet('vpn_r',[]));
      const [rvList,  setRv]   = useState(()=> lsGet('vpn_rv',[]));
      const [syncing, setSyn]  = useState(false);
      const [lastSync,setLS]   = useState(null);
      const [syncErr, setSEr]  = useState(false);
      const [toast,   setToast]= useState(null);
      const [now,     setNow]  = useState(new Date());

      /* Formulario registro */
      const [form,   setForm]  = useState({tipo:'',placa:'',conductor:'',visitaA:'',obs:'',vehiculo:''});
      const [pQ,     setPQ]    = useState('');
      const [showDd, setDd]    = useState(false);
      const [tried,  setTried] = useState(false);
      const [saving, setSaving]= useState(false);

      /* Login */
      const [loginMode, setLoginMode] = useState('guard'); // 'guard'|'admin'|'viewer'
      const [lp,  setLp]  = useState('');
      const [lg,  setLg]  = useState('');
      const [au,  setAu]  = useState('');
      const [ap,  setAp]  = useState('');
      const [vu,  setVu]  = useState('');
      const [vp,  setVp]  = useState('');
      const [loginErr, setLoginErr] = useState('');
      const loginAttempts = useRef(0);
      const lockUntil    = useRef(0);

      /* Tabs */
      const [tab,  setTab]  = useState('reg');
      const [atab, setAtab] = useState('records');

      /* Filtros */
      const [hq,    setHq]    = useState('');
      const [hport, setHport] = useState('todas');
      const [hmov,  setHmov]  = useState('todos');

      /* Admin config */
      const [cUrl, setCUrl] = useState(cfg.url);
      const [cnp,  setCnp]  = useState('');
      const [ccp,  setCcp]  = useState('');
      const [newVU,  setNewVU]  = useState('');
      const [newVP,  setNewVP]  = useState('');
      const [newVP2, setNewVP2] = useState('');

      /* Setup */
      const [setupUrl,   setSetupUrl]   = useState('');
      const [setupAdmU,  setSetupAdmU]  = useState('admin');
      const [setupAdmP,  setSetupAdmP]  = useState('');
      const [setupAdmP2, setSetupAdmP2] = useState('');

      /* Import ref */
      const importRef = useRef(null);

      /* Reloj */
      useEffect(()=>{
        const t = setInterval(()=> setNow(new Date()), 1000);
        return ()=> clearInterval(t);
      },[]);

      /* Auto-sync */
      useEffect(()=>{
        if(!user || !isOk) return;
        doSync();
        const iv = setInterval(doSync, 60000);
        return ()=> clearInterval(iv);
      },[user, isOk]);

      /* Siempre ingreso al entrar a pestaña reg */
      useEffect(()=>{ if(tab==='reg') resetForm(); },[tab]);

      const notify = useCallback((msg, err=false)=>{
        setToast({msg,err});
        setTimeout(()=>setToast(null), 3500);
      },[]);

      /* ── Sync ── */
      async function doSync(){
        if(!cfg.url || !user) return;
        setSyn(true); setSEr(false);
        try{
          const params = {accion:'registros'};
          if(user.type==='guard') params.porteria = user.porteria;
          const res = await gsGet(cfg.url, params);
          if(res?.registros){
            const limited = res.registros.slice(0, MAX_LOCAL_RECORDS);
            setRec(limited); lsSet('vpn_r', limited);
          } else { setSEr(true); }
          const rv = await gsGet(cfg.url, {accion:'recurrentes'});
          if(rv?.recurrentes){ setRv(rv.recurrentes); lsSet('vpn_rv', rv.recurrentes); }
          setLS(new Date().toISOString());
        }catch(e){ setSEr(true); }
        finally{ setSyn(false); }
      }

      /* ── Logins ── */
      function doLogin(){
        setLoginErr('');
        if(!lp){ setLoginErr('Seleccione una portería'); return; }
        const gn = lg.trim();
        if(!gn || gn.length < 2){ setLoginErr('Ingrese el nombre del guarda (mín. 2 caracteres)'); return; }
        if(!isOk){ setLoginErr('Configure la URL de Google Sheets primero'); return; }
        setUser({type:'guard', porteria:lp, guard:sanitize(gn)});
        setScr('app'); setTab('reg'); resetForm();
      }
      async function doALogin(){
        setLoginErr('');
        const now2 = Date.now();
        if(lockUntil.current > now2){
          setLoginErr(`Demasiados intentos. Espere ${Math.ceil((lockUntil.current-now2)/1000)}s.`); return;
        }
        if(!au.trim() || !ap){ setLoginErr('Complete todos los campos'); return; }
        const salt = getOrCreateSalt();
        const h = await hashPass(ap, salt);
        const ok = (au.trim()===cfg.user) && (cfg.passInitialized?(h===cfg.passHash):(ap==='admin123'));
        if(ok){
          loginAttempts.current=0;
          if(!cfg.passInitialized) notify('⚠️ Contraseña por defecto. Cámbiela en Configuración.',true);
          setUser({type:'admin'}); setScr('admin'); setAtab('records');
        } else {
          loginAttempts.current++;
          if(loginAttempts.current>=5){
            lockUntil.current=Date.now()+30000; loginAttempts.current=0;
            setLoginErr('Cuenta bloqueada 30 segundos por exceso de intentos.');
          } else {
            setLoginErr(`Credenciales incorrectas (intento ${loginAttempts.current}/5)`);
          }
        }
      }
      async function doViewerLogin(){
        setLoginErr('');
        if(!vu.trim()||!vp){ setLoginErr('Complete todos los campos'); return; }
        const viewers = cfg.viewers||[];
        if(viewers.length===0){ setLoginErr('No hay usuarios visor configurados'); return; }
        const salt = getOrCreateSalt();
        const h = await hashPass(vp, salt);
        const found = viewers.find(v=>v.user===vu.trim()&&v.passHash===h);
        if(found){ setUser({type:'viewer',name:found.user}); setScr('viewer'); }
        else{ setLoginErr('Credenciales incorrectas'); }
      }
      function doLogout(){
        setScr('login'); setUser(null);
        setLp(''); setLg(''); setAu(''); setAp(''); setVu(''); setVp('');
        setLoginMode('guard'); setLoginErr('');
        setRec([]); resetForm(); lsSet('vpn_r',[]);
      }

      /* ── Formulario ── */
      function resetForm(){
        setForm({tipo:'',placa:'',conductor:'',visitaA:'',obs:'',vehiculo:''});
        setPQ(''); setDd(false); setTried(false);
      }
      async function doSubmit(){
        if(saving) return;
        setTried(true);
        const isV   = form.tipo.includes('Visitante');
        const placa = sanitizePlaca(form.placa);
        const conductor = sanitize(form.conductor, 120);
        const visitaA   = sanitize(form.visitaA, 120);
        const obs       = sanitize(form.obs, 500);
        const errors = [];
        if(!form.vehiculo)                    errors.push('Seleccione tipo de vehículo (Moto o Carro)');
        if(!form.tipo)                         errors.push('Seleccione tipo de persona');
        if(!placa)                             errors.push('Ingrese la placa del vehículo');
        else if(!validarPlaca(placa,form.vehiculo))
          errors.push(form.vehiculo==='moto'?'Placa moto inválida (ej: ABC92C)':'Placa carro inválida (ej: ABC123)');
        if(!conductor)                         errors.push('Ingrese el nombre del conductor');
        if(isV && !visitaA)                    errors.push('Ingrese a quién visita');
        if(errors.length>0){ notify(errors[0],true); return; }
        setSaving(true);
        try{
          const rec = {
            id:genId(), porteria:user.porteria, tipo:form.tipo, vehiculo:form.vehiculo,
            placa, conductor, guarda:user.guard,
            movimiento:'ingreso', visitaA, obs,
            ts:nowISO(), fecha:nowLabel(),
          };
          const nr = [rec,...records].slice(0,MAX_LOCAL_RECORDS);
          setRec(nr); lsSet('vpn_r',nr);
          gsPost(cfg.url,{tipo_operacion:'registro',...rec});
          notify('✓ Ingreso registrado correctamente');
          resetForm();
        }finally{ setSaving(false); }
      }

      function doExit(rec){
        const gn = user?.type==='admin'||user?.type==='viewer'?'Administrador':(user?.guard||'Sistema');
        const e2 = {
          id:genId(), porteria:rec.porteria, tipo:rec.tipo, vehiculo:rec.vehiculo||'',
          placa:rec.placa, conductor:rec.conductor, guarda:gn, movimiento:'salida',
          visitaA:rec.visitaA||'',
          obs:sanitize(`Salida. Ingreso: ${fmtDate(rec.ts)}`),
          ts:nowISO(), fecha:nowLabel(), quickFrom:rec.id,
        };
        const nr=[e2,...records].slice(0,MAX_LOCAL_RECORDS);
        setRec(nr); lsSet('vpn_r',nr);
        gsPost(cfg.url,{tipo_operacion:'registro',...e2});
        notify('✓ Salida registrada');
      }
      function hasExit(rec){
        const t=new Date(rec.ts||0).getTime();
        return records.some(r=>r.placa===rec.placa&&r.movimiento==='salida'&&new Date(r.ts||0).getTime()>t);
      }

      /* ── Recurrentes ── */
      function getFRv(){
        if(!user||user.type==='admin'||user.type==='viewer') return [];
        const rt=PC[user.porteria]?.rt||[];
        const q=pQ.toUpperCase();
        return rvList.filter(v=>rt.includes(v.tipo)&&(!q||v.placa.includes(q)||v.conductor.toUpperCase().includes(q)));
      }
      function pickRv(v){
        setForm(p=>({...p,placa:v.placa,conductor:v.conductor,tipo:v.tipo,vehiculo:v.vehiculo||'carro'}));
        setPQ(v.placa); setDd(false);
      }
      function doAddRvGeneric(nrv, onReset, tiposValidos){
        const placa=sanitizePlaca(nrv.placa);
        const conductor=sanitize(nrv.conductor,120);
        if(!nrv.vehiculo){ notify('Seleccione tipo de vehículo',true); return; }
        if(!validarPlaca(placa,nrv.vehiculo)){
          notify(nrv.vehiculo==='moto'?'Placa moto inválida (ej: ABC92C)':'Placa carro inválida (ej: ABC123)',true); return;
        }
        if(!conductor){ notify('Ingrese el conductor',true); return; }
        if(!nrv.tipo){ notify('Seleccione el tipo',true); return; }
        if(!tiposValidos.includes(nrv.tipo)){ notify('Tipo no válido para esta portería',true); return; }
        if(rvList.find(v=>v.placa===placa)){ notify('Esa placa ya existe',true); return; }
        const v={id:genId(),placa,conductor,tipo:nrv.tipo,vehiculo:nrv.vehiculo};
        const nl=[...rvList,v];
        setRv(nl); lsSet('vpn_rv',nl);
        gsPost(cfg.url,{tipo_operacion:'recurrente_agregar',...v});
        onReset&&onReset();
        notify('✓ Recurrente agregado');
      }
      function doDelRv(id){
        const nl=rvList.filter(v=>v.id!==id);
        setRv(nl); lsSet('vpn_rv',nl);
        gsPost(cfg.url,{tipo_operacion:'recurrente_eliminar',id});
        notify('Vehículo eliminado');
      }

      /* ── Importar CSV ── */
      function handleImportFile(e){
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=ev=>doImportRv(ev.target.result);
        reader.readAsText(file,'utf-8');
        e.target.value='';
      }
      function doImportRv(csvText){
        const lines=csvText.split(/\r?\n/).filter(l=>l.trim());
        const tiposValidos=["Residente","Gerente","Visitante","Contratista","Colaborador","Colaborador Biopacol"];
        let added=0, skipped=0;
        const nl=[...rvList];
        for(const line of lines){
          const low=line.toLowerCase().trim();
          if(low.startsWith('placa')||low.startsWith('"placa')) continue;
          const parts=line.split(',').map(p=>p.trim().replace(/^"|"$/g,''));
          if(parts.length<3){ skipped++; continue; }
          const placa=sanitizePlaca(parts[0]);
          const conductor=sanitize(parts[1]||'',120);
          const tipo=(parts[2]||'').trim();
          const vehRaw=(parts[3]||'').toLowerCase().trim();
          const isCarro=PLACA_CARRO.test(placa);
          const isMoto=PLACA_MOTO.test(placa);
          if(!isCarro&&!isMoto){ skipped++; continue; }
          if(!tiposValidos.includes(tipo)){ skipped++; continue; }
          if(!conductor){ skipped++; continue; }
          if(nl.find(v=>v.placa===placa)){ skipped++; continue; }
          const vehiculo=vehRaw==='moto'?'moto':vehRaw==='carro'?'carro':(isMoto?'moto':'carro');
          const v={id:genId(),placa,conductor,tipo,vehiculo};
          nl.push(v);
          gsPost(cfg.url,{tipo_operacion:'recurrente_agregar',...v});
          added++;
        }
        setRv(nl); lsSet('vpn_rv',nl);
        notify(`✓ Importados: ${added}. Omitidos: ${skipped}`);
      }

      /* ── Usuarios visor ── */
      async function doAddViewer(){
        if(!newVU.trim()){ notify('Ingrese el nombre de usuario',true); return; }
        if(!newVP||newVP.length<6){ notify('Contraseña mínimo 6 caracteres',true); return; }
        if(newVP!==newVP2){ notify('Las contraseñas no coinciden',true); return; }
        const viewers=cfg.viewers||[];
        if(viewers.find(v=>v.user===newVU.trim())){ notify('Ese usuario ya existe',true); return; }
        const salt=getOrCreateSalt();
        const passHash=await hashPass(newVP,salt);
        const nv={id:genId(),user:sanitize(newVU.trim(),40),passHash};
        const nc={...cfg,viewers:[...viewers,nv]};
        setCfg(nc); lsSet('vpn_cfg2',nc);
        setNewVU(''); setNewVP(''); setNewVP2('');
        notify('✓ Usuario visor creado');
      }
      function doDelViewer(id){
        const viewers=(cfg.viewers||[]).filter(v=>v.id!==id);
        const nc={...cfg,viewers};
        setCfg(nc); lsSet('vpn_cfg2',nc);
        notify('Usuario visor eliminado');
      }

      /* ── Config admin ── */
      async function doSaveCfg(){
        if(!cUrl.includes('script.google.com')){ notify('URL inválida — debe ser de script.google.com',true); return; }
        if(cnp&&cnp.length<8){ notify('La contraseña debe tener al menos 8 caracteres',true); return; }
        if(cnp&&cnp!==ccp){ notify('Las contraseñas no coinciden',true); return; }
        const nc={...cfg,url:cUrl};
        if(cnp){ const salt=getOrCreateSalt(); nc.passHash=await hashPass(cnp,salt); nc.passInitialized=true; }
        setCfg(nc); lsSet('vpn_cfg2',nc); setCUrl(cUrl); setCnp(''); setCcp('');
        notify('✓ Configuración guardada');
      }
      async function doSetupSave(){
        if(!setupUrl.includes('script.google.com')){ notify('URL inválida',true); return; }
        if(!setupAdmP||setupAdmP.length<8){ notify('Contraseña mín. 8 caracteres',true); return; }
        if(setupAdmP!==setupAdmP2){ notify('Las contraseñas no coinciden',true); return; }
        if(!setupAdmU.trim()){ notify('Ingrese el usuario admin',true); return; }
        const salt=getOrCreateSalt();
        const hash=await hashPass(setupAdmP,salt);
        const nc={url:setupUrl,user:sanitize(setupAdmU,30),passHash:hash,passInitialized:true,viewers:[]};
        setCfg(nc); lsSet('vpn_cfg2',nc);
        notify('✓ Configuración guardada. Puede iniciar sesión.');
      }

      /* ── Registros filtrados ── */
      const filtR = useMemo(()=>{
        return records.filter(r=>{
          if(user?.type==='guard'&&r.porteria!==user.porteria) return false;
          const mp=hport==='todas'||r.porteria===hport;
          const mm=hmov==='todos'||r.movimiento===hmov;
          if(!hq) return mp&&mm;
          const q=hq.toLowerCase();
          return mp&&mm&&(
            r.placa?.toLowerCase().includes(q)||
            r.conductor?.toLowerCase().includes(q)||
            r.guarda?.toLowerCase().includes(q)||
            r.tipo?.toLowerCase().includes(q)||
            r.vehiculo?.toLowerCase().includes(q)
          );
        });
      },[records,user,hport,hmov,hq]);

      /* ── Estilos ── */
      const inp = (err=false)=>({
        width:'100%',background:err?DANGER_BG:SRF,border:`1.5px solid ${err?'#fca5a5':BD}`,
        borderRadius:8,padding:'11px 14px',color:TX,fontFamily:'Rajdhani,sans-serif',
        fontSize:15,outline:'none',boxSizing:'border-box',transition:'border-color 0.2s',
      });
      const sel = (err=false)=>({...inp(err),appearance:'none',WebkitAppearance:'none'});
      const card = {background:BG,borderRadius:12,padding:16,border:`1px solid ${BD}`,
        marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.05)'};
      const lbl = {display:'block',fontSize:11,fontWeight:600,letterSpacing:'0.12em',
        color:TM,marginBottom:7,textTransform:'uppercase',fontFamily:'DM Sans,sans-serif'};
      const btn = (bg,col,ex={})=>({
        borderRadius:8,padding:13,fontFamily:'Rajdhani,sans-serif',fontSize:16,fontWeight:700,
        letterSpacing:'0.06em',cursor:'pointer',border:'none',background:bg,color:col,
        width:'100%',transition:'opacity 0.15s',
        boxShadow:(bg===G||bg===GM)?'0 2px 8px rgba(26,107,30,0.25)':'none',...ex
      });
      const wrap = {fontFamily:'Rajdhani,sans-serif',background:BG,minHeight:'100vh',color:TX,maxWidth:430,margin:'0 auto'};

      const pc  = user?.type==='guard' ? PC[user.porteria] : null;
      const frv = getFRv();
      const rvc = pc ? rvList.filter(v=>pc.rt.includes(v.tipo)).length : 0;
      const isV = form.tipo.includes('Visitante')||form.tipo.includes('Contratista');

      /* ══════════════════════════════════════════════════════════════
         PANTALLA: SETUP (primer uso)
      ══════════════════════════════════════════════════════════════ */
      if(!isOk) return (
        <div style={{...wrap,padding:'24px 20px',minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          {toast&&<Toast t={toast}/>}
          <div style={{textAlign:'center',marginBottom:24}}>
            <IconVehiculo size={72}/>
            <div style={{fontSize:24,fontWeight:900,color:GHD,marginTop:14,letterSpacing:'0.04em'}}>PAPELES NACIONALES</div>
            <div style={{fontSize:13,color:G,fontWeight:600,letterSpacing:'0.2em',marginTop:4}}>Control Vehicular</div>
          </div>
          <div style={card}>
            <div style={{fontSize:16,fontWeight:700,color:G,marginBottom:4}}>⚙️ Configuración Inicial</div>
            <div style={{fontSize:12,color:TM,fontFamily:'DM Sans,sans-serif',marginBottom:16,lineHeight:1.6}}>
              Configure la conexión con Google Sheets y las credenciales del administrador.
            </div>
            <label style={lbl}>URL del Google Apps Script *</label>
            <textarea style={{...inp(false),resize:'none',height:76,fontSize:12,lineHeight:1.4,marginBottom:12}}
              placeholder="https://script.google.com/macros/s/AKfy.../exec"
              value={setupUrl} onChange={e=>setSetupUrl(e.target.value)}/>
            <label style={lbl}>Usuario administrador *</label>
            <input style={{...inp(false),marginBottom:12}} placeholder="admin"
              value={setupAdmU} onChange={e=>setSetupAdmU(e.target.value)}/>
            <label style={lbl}>Contraseña admin (mín. 8 caracteres) *</label>
            <input type="password" style={{...inp(false),marginBottom:12}}
              placeholder="••••••••" value={setupAdmP} onChange={e=>setSetupAdmP(e.target.value)}/>
            <label style={lbl}>Confirmar contraseña *</label>
            <input type="password" style={{...inp(false),marginBottom:16}}
              placeholder="••••••••" value={setupAdmP2} onChange={e=>setSetupAdmP2(e.target.value)}/>
            <button style={btn(G,'white')} onClick={doSetupSave}>✓ GUARDAR Y CONTINUAR</button>
          </div>
          <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'#9ab89a',fontFamily:'DM Sans,sans-serif'}}>
            Control Vehicular · Papeles Nacionales S.A.S. · v3.0
          </div>
        </div>
      );

      /* ══════════════════════════════════════════════════════════════
         PANTALLA: LOGIN — fondo blanco, nuevo icono
      ══════════════════════════════════════════════════════════════ */
      if(screen==='login') return (
        <div style={{...wrap,minHeight:'100vh',display:'flex',flexDirection:'column',background:'#fff'}}>
          {toast&&<Toast t={toast}/>}

          {/* Hero */}
          <div style={{padding:'44px 24px 28px',textAlign:'center',
            borderBottom:`1px solid ${BD}`,background:'#fff'}}>
            <div style={{display:'inline-flex',justifyContent:'center',marginBottom:18}}>
              <IconVehiculo size={80}/>
            </div>
            <div style={{fontSize:28,fontWeight:900,letterSpacing:'0.04em',color:GHD,lineHeight:1.05,fontFamily:'Rajdhani,sans-serif'}}>
              PAPELES NACIONALES
            </div>
            <div style={{fontSize:14,fontWeight:600,letterSpacing:'0.22em',color:G,marginTop:6,fontFamily:'Rajdhani,sans-serif'}}>
              Control Vehicular
            </div>
          </div>

          {/* Login mode tabs */}
          <div style={{display:'flex',borderBottom:`1.5px solid ${BD}`,background:'#fff'}}>
            {[['guard','🔒 Guarda'],['admin','🛡️ Admin'],['viewer','👁 Visor']].map(([m,l])=>(
              <button key={m}
                className={`login-tab-btn${loginMode===m?' active':''}`}
                onClick={()=>{setLoginMode(m);setLoginErr('');}}>
                {l}
              </button>
            ))}
          </div>

          <div style={{padding:'22px 20px',flex:1,background:'#fff'}}>
            <div style={{...card,marginBottom:14}}>

              {/* GUARDA */}
              {loginMode==='guard' && <>

                <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',letterSpacing:'0.12em',
                  textTransform:'uppercase',fontFamily:'DM Sans,sans-serif'}}>Turno activo</div>
                <div style={{fontSize:15,fontWeight:700,color:'white'}}>{pc.icon} {user.porteria}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:14,fontWeight:700,color:'white',fontVariantNumeric:'tabular-nums'}}>
                  {now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
                </div>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',fontFamily:'DM Sans,sans-serif'}}>
                  {user.guard}
                </div>
              </div>
            </div>
          </div>
          <SyncBar syncing={syncing} lastSync={lastSync} err={syncErr}/>
          {/* Tabs */}
          <div style={{display:'flex',background:BG,borderBottom:`1.5px solid ${BD}`,position:'sticky',top:53,zIndex:40}}>
            {[['reg','📋 Registro'],['hist','📊 Historial'],['ladm','⚙️ Admin']].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)}
                style={{flex:1,padding:'11px 0',background:'none',border:'none',
                  borderBottom:`2.5px solid ${tab===k?pc.color:'transparent'}`,
                  color:tab===k?pc.color:TM,fontFamily:'Rajdhani,sans-serif',
                  fontSize:13,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',cursor:'pointer'}}>
                {l}
              </button>
            ))}
          </div>

          <div style={{padding:16}}>

            {/* ── REGISTRO ── */}
            {tab==='reg' && <>

              {/* Tipo de movimiento — solo INGRESO */}
              <div style={card}>
                <label style={lbl}>Tipo de movimiento</label>
                <div style={{padding:'14px 16px',borderRadius:10,background:SUCCESS_BG,
                  border:'2px solid #86efac',display:'flex',alignItems:'center',
                  justifyContent:'center',gap:10}}>
                  <span style={{fontSize:22}}>⬆</span>
                  <span style={{color:'#15803d',fontFamily:'Rajdhani,sans-serif',
                    fontSize:18,fontWeight:700,letterSpacing:'0.08em'}}>INGRESO</span>
                </div>
              </div>

              {/* Tipo de vehículo */}
              <div style={card}>
                <label style={lbl}>Tipo de vehículo *</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  {[['carro','🚗','Carro'],['moto','🏍','Moto']].map(([v,ico,label])=>(
                    <button key={v}
                      onClick={()=>setForm(p=>({...p,vehiculo:v,placa:''}))}
                      style={{padding:'16px 0',borderRadius:10,
                        border:`2px solid ${form.vehiculo===v?pc.color:BD}`,
                        background:form.vehiculo===v?'#e8f5e9':BG,
                        color:form.vehiculo===v?pc.color:TM,
                        fontFamily:'Rajdhani,sans-serif',fontSize:18,fontWeight:700,
                        letterSpacing:'0.06em',cursor:'pointer',textTransform:'uppercase',
                        transition:'all 0.15s'}}>
                      {ico} {label}
                    </button>
                  ))}
                </div>
                {tried&&!form.vehiculo&&<FErr msg="Seleccione Moto o Carro"/>}
                {form.vehiculo && (
                  <div style={{marginTop:8,fontSize:11,color:TM,fontFamily:'DM Sans,sans-serif',
                    padding:'6px 10px',background:SRF,borderRadius:6}}>
                    {form.vehiculo==='moto'
                      ?'Formato placa moto: ABC92C (3 letras + 2 números + 1 letra)'
                      :'Formato placa carro: ABC123 (3 letras + 3 números)'}
                  </div>
                )}
              </div>

              {/* Tipo de persona */}
              <div style={card}>
                <label style={lbl}>Tipo de persona / vehículo *</label>
                <select style={sel(tried&&!form.tipo)} value={form.tipo}
                  onChange={e=>setForm(p=>({...p,tipo:e.target.value,visitaA:''}))}>
                  <option value="">— Seleccionar tipo —</option>
                  {pc.tipos.map(t=><option key={t}>{t}</option>)}
                </select>
                {tried&&!form.tipo&&<FErr/>}
              </div>

              {/* Placa + recurrentes */}
              <div style={card}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <label style={{...lbl,marginBottom:0}}>Placa del vehículo *</label>
                  <button onClick={()=>setDd(!showDd)}
                    style={{background:showDd?'#e8f5e9':'transparent',
                      border:`1.5px solid ${G}`,color:G,borderRadius:20,
                      padding:'3px 11px',fontSize:11,fontWeight:700,
                      fontFamily:'Rajdhani,sans-serif',cursor:'pointer',letterSpacing:'0.08em'}}>
                    ⭐ {rvc>0?`(${rvc})`:''}
                  </button>
                </div>
                <input
                  style={{...inp(tried&&!form.placa.trim()),
                    textTransform:'uppercase',fontWeight:700,fontSize:22,letterSpacing:'0.15em'}}
                  placeholder={form.vehiculo==='moto'?'ABC92C':form.vehiculo==='carro'?'ABC123':'ABC123'}
                  value={form.placa} maxLength={6}
                  onChange={e=>{
                    const v=sanitizePlaca(e.target.value);
                    setForm(p=>({...p,placa:v})); setPQ(v);
                  }}
                  onFocus={()=>setDd(true)}
                  onBlur={()=>setTimeout(()=>setDd(false),200)}/>
                {tried&&!form.placa.trim()&&<FErr/>}
                {tried&&form.placa&&!validarPlaca(form.placa,form.vehiculo)&&(
                  <FErr msg={form.vehiculo==='moto'?'Placa moto inválida (ej: ABC92C)':'Placa carro inválida (ej: ABC123)'}/>
                )}
                {showDd&&(
                  <div style={{background:BG,border:`1.5px solid ${BD}`,borderRadius:10,
                    marginTop:8,maxHeight:220,overflowY:'auto',
                    boxShadow:'0 4px 12px rgba(0,0,0,0.1)',zIndex:10,position:'relative'}}>
                    {frv.length===0
                      ?<div style={{padding:'14px 16px',color:TM,fontSize:13,fontFamily:'DM Sans,sans-serif'}}>
                         {rvc===0?'No hay recurrentes para esta portería':'Sin coincidencias'}
                       </div>
                      :frv.map(v=>(
                          <div key={v.id} onMouseDown={()=>pickRv(v)}
                            style={{padding:'12px 16px',cursor:'pointer',
                              borderBottom:`1px solid ${BD}`,
                              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div>
                              <div style={{fontWeight:700,letterSpacing:'0.1em',color:G,fontSize:18}}>{v.placa}</div>
                              <div style={{fontSize:12,color:TM,fontFamily:'DM Sans,sans-serif'}}>{v.conductor}</div>
                            </div>
                            <div style={{display:'flex',gap:4,flexDirection:'column',alignItems:'flex-end'}}>
                              <Badge tipo={v.tipo}/>
                              {v.vehiculo&&<BadgeVeh vehiculo={v.vehiculo}/>}
                            </div>
                          </div>
                        ))
                    }
                  </div>
                )}
              </div>

              {/* Conductor */}
              <div style={card}>
                <label style={lbl}>Nombre del conductor *</label>
                <input style={inp(tried&&!form.conductor.trim())}
                  placeholder="Nombre completo" value={form.conductor}
                  maxLength={120}
                  onChange={e=>setForm(p=>({...p,conductor:e.target.value}))}/>
                {tried&&!form.conductor.trim()&&<FErr/>}
              </div>

              {/* Visita a — visitantes y contratistas */}
              {isV&&(
                <div style={{...card,borderLeft:`4px solid ${GM}`}}>
                  <label style={lbl}>¿A quién visita / empresa contratante? *</label>
                  <input style={inp(tried&&!form.visitaA.trim())}
                    placeholder="Nombre de la persona o área"
                    value={form.visitaA} maxLength={120}
                    onChange={e=>setForm(p=>({...p,visitaA:e.target.value}))}/>
                  {tried&&!form.visitaA.trim()&&<FErr msg="Requerido para visitantes y contratistas"/>}
                </div>
              )}

              {/* Observaciones */}
              <div style={card}>
                <label style={lbl}>
                  Observaciones{' '}
                  <span style={{color:TM,fontWeight:400,textTransform:'none',letterSpacing:0}}>(opcional)</span>
                </label>
                <textarea style={{...inp(false),resize:'none',minHeight:76,lineHeight:1.6}}
                  placeholder="Anote cualquier observación relevante..."
                  value={form.obs} maxLength={500}
                  onChange={e=>setForm(p=>({...p,obs:e.target.value}))}/>
                <div style={{textAlign:'right',fontSize:10,color:TM,marginTop:3,fontFamily:'DM Sans,sans-serif'}}>
                  {form.obs.length}/500
                </div>
              </div>

              <button onClick={doSubmit} disabled={saving}
                style={btn(G,'white',{fontSize:18,padding:17,marginBottom:10,letterSpacing:'0.1em',
                  boxShadow:'0 4px 12px rgba(26,107,30,0.3)',opacity:saving?0.75:1,
                  display:'flex',alignItems:'center',justifyContent:'center',gap:10})}>
                {saving&&<Spinner/>}
                {saving?'Guardando...':'⬆ REGISTRAR INGRESO'}
              </button>
              <button onClick={resetForm}
                style={btn('transparent',TM,{fontSize:12,padding:8,border:'none',boxShadow:'none'})}>
                ↺ Limpiar formulario
              </button>
            </>}

            {/* ── HISTORIAL ── */}
            {tab==='hist' && <>
              <div style={{...card,padding:'10px 12px',marginBottom:12,
                background:SUCCESS_BG,border:'1px solid #86efac'}}>
                <div style={{fontSize:12,color:SUCCESS,fontFamily:'DM Sans,sans-serif'}}>
                  📍 Registros de: <strong>{user.porteria}</strong>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginBottom:12}}>
                <input style={{...inp(false),flex:1}}
                  placeholder="Buscar placa, conductor..." value={hq}
                  onChange={e=>setHq(e.target.value)} maxLength={100}/>
                <button onClick={doSync}
                  style={{...btn(BG,G,{flex:'none',width:'auto',padding:'0 14px',
                    border:`1.5px solid ${G}`,fontSize:18,boxShadow:'none'})}}>
                  {syncing?<Spinner/>:'🔄'}
                </button>
              </div>
              {/* Filtro movimiento — conservar salida en historial */}
              <div style={{display:'flex',gap:6,marginBottom:12}}>
                {['todos','ingreso','salida'].map(m=>(
                  <button key={m} onClick={()=>setHmov(m)}
                    style={{flex:1,padding:'7px',borderRadius:8,
                      border:`1.5px solid ${hmov===m?(m==='ingreso'?'#16a34a':m==='salida'?DANGER:G):BD}`,
                      background:hmov===m?(m==='ingreso'?SUCCESS_BG:m==='salida'?DANGER_BG:'#e8f5e9'):'transparent',
                      color:hmov===m?(m==='ingreso'?'#16a34a':m==='salida'?DANGER:G):TM,
                      fontFamily:'Rajdhani,sans-serif',fontSize:11,fontWeight:700,
                      cursor:'pointer',textTransform:'uppercase'}}>
                    {m==='todos'?'TODOS':m==='ingreso'?'⬆ ING':'⬇ SAL'}
                  </button>
                ))}
              </div>
              <div style={{fontSize:11,color:TM,marginBottom:12,fontFamily:'DM Sans,sans-serif'}}>
                {filtR.length} registro{filtR.length!==1?'s':''}
              </div>
              {filtR.length===0
                ?<div style={{textAlign:'center',padding:'50px 0',color:TM}}>
                   <div style={{fontSize:48}}>📋</div>
                   <div style={{fontFamily:'DM Sans,sans-serif',marginTop:10}}>Sin registros</div>
                 </div>
                :filtR.map(r=><RecordCard key={r.id} r={r} onExit={doExit} hasExit={hasExit} showPort={false}/>)
              }
            </>}

            {/* ── ADMIN LOCAL (GUARDA) ── */}
            {tab==='ladm' && <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
                {[
                  ['Esta portería',records.filter(r=>r.porteria===user.porteria).length,pc.color],
                  ['Recurrentes',rvc,GM],
                  ['Ingresos hoy',records.filter(r=>r.movimiento==='ingreso'&&r.porteria===user.porteria&&(r.ts||'').slice(0,10)===nowISO().slice(0,10)).length,'#16a34a'],
                  ['Salidas hoy', records.filter(r=>r.movimiento==='salida'&&r.porteria===user.porteria&&(r.ts||'').slice(0,10)===nowISO().slice(0,10)).length,DANGER],
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:BG,borderRadius:10,padding:'14px 12px',
                    textAlign:'center',border:`1.5px solid ${c}25`,boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                    <div style={{fontSize:32,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                    <div style={{fontSize:11,color:TM,fontFamily:'DM Sans,sans-serif',marginTop:4}}>{l}</div>
                  </div>
                ))}
              </div>

              <div style={card}>
                <div style={{fontSize:15,fontWeight:700,marginBottom:14,color:pc.color}}>
                  ⭐ Agregar Vehículo Recurrente
                </div>
                <FormRecurrente
                  tiposDisponibles={pc.rt}
                  rvList={rvList}
                  onAdd={(nrv,cb)=>doAddRvGeneric(nrv,cb,pc.rt)}
                  onImport={null}
                  importRef={null}
                  color={pc.color}/>
              </div>

              {rvList.filter(v=>pc.rt.includes(v.tipo)).map(v=>(
                <div key={v.id} style={{...card,display:'flex',justifyContent:'space-between',
                  alignItems:'center',marginBottom:8}}>
                  <div>
                    <div style={{fontWeight:700,letterSpacing:'0.1em',fontSize:18}}>{v.placa}</div>
                    <div style={{fontSize:13,color:TM,fontFamily:'DM Sans,sans-serif',marginBottom:5}}>
                      {v.conductor}
                    </div>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <Badge tipo={v.tipo}/>
                      {v.vehiculo&&<BadgeVeh vehiculo={v.vehiculo}/>}
                    </div>
                  </div>
                  <button onClick={()=>doDelRv(v.id)}
                    style={{background:DANGER_BG,color:DANGER,border:'1px solid #fca5a5',
                      borderRadius:8,padding:'8px 14px',cursor:'pointer',
                      fontFamily:'Rajdhani,sans-serif',fontWeight:700,fontSize:16}}>✕</button>
                </div>
              ))}
              <button onClick={doLogout}
                style={btn('transparent',TM,{border:`1.5px solid ${BD}`,marginTop:16,fontSize:14,boxShadow:'none'})}>
                ← Cerrar Sesión / Cambiar Portería
              </button>
            </>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('./sw.js')
          .then(r=>console.log('SW registrado:',r.scope))
          .catch(e=>console.warn('SW no disponible:',e));
      });
    }
  </script>
</body>
</html>
